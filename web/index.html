<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Authorize Agent Wallet</title>
    <style>
      body { font-family: ui-sans-serif, system-ui; max-width: 720px; margin: 3rem auto; padding: 0 1rem; }
      pre { background: #f4f4f5; padding: 0.75rem; border-radius: 6px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow: auto; }
      button { padding: 0.6rem 1rem; font-size: 1rem; cursor: pointer; margin-right: 0.5rem; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
      input { width: 100%; padding: 0.4rem; box-sizing: border-box; font-family: ui-monospace, monospace; }
      h1 { margin-bottom: 0.25rem; }
      .sub { color: #666; margin-top: 0; }
    </style>
  </head>
  <body>
    <h1>Authorize Agent Wallet</h1>
    <p class="sub">Your owner key signs in the browser. The agent server only ever sees the resulting approval.</p>

    <label>API base</label>
    <input id="api" value="http://localhost:3030" />
    <label>Bearer token (your DEMO_TOKENS entry)</label>
    <input id="token" placeholder="token1" />

    <p>
      <button id="connect">1. Connect wallet</button>
      <button id="grant" disabled>2. Sign &amp; grant</button>
    </p>

    <pre id="log">ready.</pre>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
