# fly.toml app configuration file generated for autoyield-api on 2026-05-10T15:56:21+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'autoyield-api'
primary_region = 'sjc'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3030'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
