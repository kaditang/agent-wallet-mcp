# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  sentry-release:
    # Builds TypeScript and uploads source maps to Sentry, tagging the
    # release with the commit SHA. Opt-in: set repo variable
    # `SENTRY_ENABLED=true` and secrets `SENTRY_AUTH_TOKEN`/`SENTRY_ORG`/
    # `SENTRY_PROJECT`. When not configured the job is skipped and deploy
    # proceeds without sourcemap correlation.
    name: Sentry release
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.SENTRY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build        # emits dist/**/*.js + dist/**/*.js.map
      - name: Create Sentry release + upload sourcemaps
        uses: getsentry/action-release@v1
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
          sourcemaps: ./dist

  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # `always()` so deploy still runs when sentry-release is skipped
    # (SENTRY_ENABLED unset). Still requires test to be green.
    needs: [test, sentry-release]
    if: always() && needs.test.result == 'success'
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Pass the commit SHA as SENTRY_RELEASE via Docker build-arg so the
      # running server tags errors with the same release id we just (maybe)
      # uploaded sourcemaps for. Picked up by the Dockerfile ARG → ENV.
      - run: flyctl deploy --remote-only --build-arg SENTRY_RELEASE=$GITHUB_SHA
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
